<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSAFooD - AI 챗봇</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; }
        .active-tab { color: #f97316; background-color: #f97316; color: white; border-radius: 9999px; }
        .tab-transition { transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-[radial-gradient(circle_at_top,_#fff7ed,_#f8fafc_60%)] text-slate-800">
    <div id="app" class="mx-auto flex min-h-screen max-w-7xl flex-col px-3 py-3 md:px-6 md:py-6 lg:px-8">
        <div class="overflow-hidden rounded-[32px] border border-slate-200 bg-white shadow-[0_20px_60px_-20px_rgba(15,23,42,0.25)]">
            <!-- Header / Navigation -->
            <header class="sticky top-0 z-50 border-b border-slate-100 bg-white/90 px-5 py-4 backdrop-blur md:px-8">
                <div class="flex flex-col gap-3 md:flex-row md:items-center md:justify-between">
                    <div>
                        <p class="text-sm font-semibold uppercase tracking-[0.3em] text-orange-500">SSAFooD</p>
                        <h1 class="text-2xl font-bold tracking-tight text-slate-900">광주 전라권 맛집 탐색</h1>
                    </div>
                    <nav class="flex flex-wrap gap-2 rounded-full border border-slate-200 bg-slate-50 p-1.5">
                        <a href="index.html" class="rounded-full px-4 py-2 text-sm font-semibold tab-transition text-slate-600 hover:bg-white hover:text-orange-500 cursor-pointer">홈</a>
                        <a href="map.html" class="rounded-full px-4 py-2 text-sm font-semibold tab-transition text-slate-600 hover:bg-white hover:text-orange-500 cursor-pointer">지도</a>
                        <a href="chat.html" class="rounded-full px-4 py-2 text-sm font-semibold tab-transition active-tab bg-orange-500 text-white shadow-sm cursor-pointer">AI 챗봇</a>
                    </nav>
                </div>
            </header>

            <main class="flex-1 overflow-y-auto p-4 md:p-8">
                <!-- Chat View -->
                <div class="mx-auto flex h-full max-w-3xl flex-col rounded-[28px] border border-slate-200 bg-white shadow-sm">
                    <div class="flex-1 space-y-4 overflow-y-auto p-4 md:p-6">
                        <div v-for="msg in messages" :key="msg.id" :class="['flex', msg.sender === 'ai' ? 'justify-start' : 'justify-end']">
                            <div :class="['max-w-[85%] rounded-2xl px-4 py-3 text-sm leading-6 shadow-sm', msg.sender === 'ai' ? 'bg-slate-100 text-slate-800' : 'bg-orange-500 text-white']">
                                {{ msg.text }}
                            </div>
                        </div>
                    </div>
                    <div class="border-t border-slate-200 bg-slate-50 p-3 md:p-4">
                        <div class="flex gap-2">
                            <input v-model="userInput" @keyup.enter="sendMessage" class="flex-1 rounded-full border border-slate-200 bg-white px-4 py-3 text-sm outline-none transition focus:border-orange-400 focus:ring-2 focus:ring-orange-100" placeholder="어떤 맛집을 찾으시나요?">
                            <button @click="sendMessage" class="rounded-full bg-orange-500 px-5 py-3 text-sm font-semibold text-white shadow-lg shadow-orange-200 transition hover:bg-orange-600">전송</button>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        const { createApp, ref } = Vue;
        createApp({
            setup() {
                const messages = ref([{ id: 1, text: "안녕하세요! 오늘은 어떤 메뉴를 찾고 계신가요?", sender: 'ai' }]);
                const userInput = ref('');

                const sendMessage = () => {
                    if (!userInput.value.trim()) return;
                    messages.value.push({ id: Date.now(), text: userInput.value, sender: 'user' });
                    const userQuery = userInput.value;
                    userInput.value = '';

                    setTimeout(() => {
                        messages.value.push({ id: Date.now(), text: `"${userQuery}"에 어울리는 맛집을 곧 추천해드릴게요.`, sender: 'ai' });
                    }, 500);
                };

                return { messages, userInput, sendMessage };
            }
        }).mount('#app');
    </script>
</body>
</html>
